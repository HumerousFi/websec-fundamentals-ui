<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <ul id="navigation">
        <li><a href="index.html">home</a></li>
        <li><a href="#report">report incident</a></li>
        <li><a href="#threats">threat database</a></li>
        <li><a href="#search">search incidents</a></li>
    </ul>
    <div class="report">
        <h2>Report a Cybersecurity Incident</h2>
        <label for="form">Please fill out the form below to report any cybersecurity incident</label>
        <div class="container">
            <form action="index.html">
                <label for="Your Name">Your Name</label>
                <input type="text" name="Your Name" placeholder="Enter your full name">
                <label for="Email Address">Email Address</label>
                <input type="email" name="Email Address" placeholder="Enter your email">
                <label for="Incident-Type">Incident-Type</label>
                <select name="Incident" id="incident-select">
                    <option value="">Select Incident Type</option>
                    <option value="">Phishing</option>
                    <option value="">Malware / Ransomware</option>
                    <option value="">Unauthorized Access</option>
                    <option value="">DDos Attack</option>
                    <option value="">Data Breach</option>
                    <option value="">Other</option>
                </select>
                <label for="Severity-level">Severity-level</label>
                <select name="Severity" id="Severity-select">
                    <option value="">Select Severity Level</option>
                    <option value="">SEV1 - Critical</option>
                    <option value="">SEV2 - High</option>
                    <option value="">SEV3 - Medium</option>
                    <option value="">SEV4 - Low</option>
                </select>
                <label for="Description">Description</label>
                <textarea name="Description" id="Description" rows="4" cols="50" placeholder="Provide a detailoed description of the incident..."></textarea>
                <label for="Date & Time of Incident"></label>
                <input type="datetime-local" name="Date & Time of Incident">
                <label for="Upload Evidence (Screenshot, Logs, etc.)"></label>
                <input type="file" name="Choose file">
                <button>Submit Report</button>
                <button>Reset</button>
            </form>
        </div>
    </div>
</body>
</html>
